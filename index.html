<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tareas</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f7f5f2;
    --surface:   #ffffff;
    --border:    #e4e0da;
    --border2:   #d0cbc3;
    --muted:     #b8b2aa;
    --text:      #1a1816;
    --sub:       #8a847c;
    --todo:      #b07d4a;
    --prog:      #3a6b8a;
    --done:      #4a8a5c;
    --danger:    #a04040;
    --radius:    8px;
    --gap:       16px;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 40px 48px 28px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 32px;
    letter-spacing: .02em;
    color: var(--text);
    line-height: 1;
  }
  header h1 span { color: var(--todo); font-style: italic; }

  .header-counts { display: flex; gap: 28px; align-items: baseline; }
  .header-counts span {
    font-size: 11px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .header-counts b { color: var(--sub); font-weight: 500; }

  /* ── ADD BAR ── */
  .add-bar {
    display: flex;
    gap: 12px;
    padding: 20px 48px;
    border-bottom: 1px solid var(--border);
    align-items: flex-end;
    flex-wrap: wrap;
    background: var(--surface);
  }
  .add-bar input[type="text"] {
    flex: 1;
    min-width: 180px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 14px;
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 13px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .add-bar input[type="text"]::placeholder { color: var(--muted); }
  .add-bar input[type="text"]:focus {
    border-color: var(--todo);
    box-shadow: 0 0 0 3px rgba(176,125,74,.08);
  }

  /* ── PRIORITY PICKER (add bar) ── */
  .priority-wrap {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex-shrink: 0;
  }
  .priority-wrap > label {
    font-size: 9px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: .12em;
    text-transform: uppercase;
  }
  .prow { display: flex; gap: 3px; }

  .psq {
    width: 24px; height: 24px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 400;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    transition: transform .08s, background .12s, color .12s, border-color .12s;
    user-select: none;
  }
  .psq:hover { border-color: var(--border2); color: var(--sub); transform: scale(1.08); }
  .psq.sel   { color: #fff !important; border-color: transparent !important; transform: scale(1.1); font-weight: 500; }

  .add-bar > button {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    padding: 9px 22px;
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .06em;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    white-space: nowrap;
    height: 38px;
  }
  .add-bar > button:hover { opacity: .78; }
  .add-bar > button:active { transform: scale(.97); }

  /* ── BOARD ── */
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--gap);
    padding: 28px 48px 48px;
    align-items: start;
  }

  /* ── COLUMN ── */
  .col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    min-height: 320px;
    box-shadow: 0 1px 4px rgba(0,0,0,.04);
  }
  .col-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .col-title {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: .01em;
    color: var(--text);
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; opacity: .7; }
  .dot-todo { background: var(--todo); }
  .dot-prog { background: var(--prog); }
  .dot-done { background: var(--done); }

  .col-badge {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 10px;
    font-weight: 500;
    border-radius: 20px;
    padding: 2px 9px;
    letter-spacing: .04em;
  }
  .col-body { padding: 12px; display: flex; flex-direction: column; gap: 7px; flex: 1; }

  /* ── CARD ── */
  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 15px;
    display: flex; flex-direction: column; gap: 10px;
    animation: slideIn .18s ease;
    transition: border-color .18s, box-shadow .18s;
  }
  .card:hover {
    border-color: var(--border2);
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── CARD TOP: badge + text ── */
  .card-top { display: flex; align-items: flex-start; gap: 11px; }

  .pbadge {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid transparent;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Jost', sans-serif;
    font-size: 12px; font-weight: 500;
  }

  .card-text {
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 300;
    line-height: 1.55;
    color: var(--text);
    word-break: break-word;
    flex: 1;
    padding-top: 5px;
  }
  .card-text.done-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  /* ── INLINE PRIORITY EDITOR (card) ── */
  .pedit-row {
    display: flex; align-items: center; gap: 5px;
  }
  .pedit-row > span {
    font-size: 9px; font-weight: 500;
    color: var(--muted); letter-spacing: .1em;
    text-transform: uppercase; white-space: nowrap;
  }
  .msq {
    width: 18px; height: 18px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    font-size: 9px; font-weight: 400; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    transition: background .1s, color .1s, border-color .1s;
    user-select: none;
  }
  .msq:hover { border-color: var(--border2); color: var(--sub); }
  .msq.sel   { color: #fff !important; border-color: transparent !important; font-weight: 500; }

  /* ── ACTIONS ── */
  .card-actions { display: flex; gap: 5px; flex-wrap: wrap; }
  .btn {
    border: 1px solid var(--border);
    background: transparent;
    border-radius: 5px;
    padding: 4px 10px;
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: .04em;
    cursor: pointer;
    transition: background .14s, color .14s, border-color .14s;
    color: var(--sub);
  }
  .btn:hover { background: var(--border); color: var(--text); border-color: var(--border2); }

  .btn-todo:hover { background: var(--todo)!important;   color: #fff!important; border-color: var(--todo)!important;   }
  .btn-prog:hover { background: var(--prog)!important;   color: #fff!important; border-color: var(--prog)!important;   }
  .btn-done:hover { background: var(--done)!important;   color: #fff!important; border-color: var(--done)!important;   }
  .btn-del:hover  { background: var(--danger)!important; color: #fff!important; border-color: var(--danger)!important; }

  /* ── EMPTY ── */
  .empty {
    text-align: center; color: var(--muted); font-size: 11px;
    font-weight: 400; letter-spacing: .04em;
    padding: 44px 10px; line-height: 2.2;
    pointer-events: none; user-select: none;
  }
  .empty-icon { font-size: 22px; display: block; margin-bottom: 6px; opacity: .5; }

  footer {
    text-align: center;
    padding: 0 0 32px;
    color: var(--muted);
    font-size: 10px;
    font-weight: 400;
    letter-spacing: .06em;
  }

  @media (max-width: 820px) {
    header, .add-bar, .board { padding-left: 20px; padding-right: 20px; }
    .board { grid-template-columns: 1fr; }
    header { flex-direction: column; align-items: flex-start; gap: 12px; padding-top: 28px; }
  }
</style>
</head>
<body>

<header>
  <h1>mis <span>tareas</span></h1>
  <div class="header-counts">
    <span>por hacer <b id="cnt-todo">0</b></span>
    <span>en progreso <b id="cnt-prog">0</b></span>
    <span>hecho <b id="cnt-done">0</b></span>
  </div>
</header>

<div class="add-bar">
  <input id="task-input" type="text" placeholder="Escribe una nueva tarea…" maxlength="200">
  <div class="priority-wrap">
    <label>PRIORIDAD</label>
    <div class="prow" id="add-prow"></div>
  </div>
  <button onclick="addTask()">+ Añadir</button>
</div>

<main class="board">
  <div class="col">
    <div class="col-head">
      <div class="col-title"><span class="dot dot-todo"></span>Por Hacer</div>
      <span class="col-badge" id="badge-todo">0</span>
    </div>
    <div class="col-body" id="body-todo"></div>
  </div>
  <div class="col">
    <div class="col-head">
      <div class="col-title"><span class="dot dot-prog"></span>En Progreso</div>
      <span class="col-badge" id="badge-prog">0</span>
    </div>
    <div class="col-body" id="body-prog"></div>
  </div>
  <div class="col">
    <div class="col-head">
      <div class="col-title"><span class="dot dot-done"></span>Hecho</div>
      <span class="col-badge" id="badge-done">0</span>
    </div>
    <div class="col-body" id="body-done"></div>
  </div>
</main>

<footer>Los datos se guardan automáticamente en este navegador · No se envía nada a internet</footer>

<script>
  const STORAGE_KEY = 'mis-tareas-v1';

  // ── PRIORITY COLOR SCALE ──────────────────────────
  // 1-3 green (baja) · 4-6 amber (media) · 7-9 naranja (alta) · 10 rojo (crítica)
  const PC = {
    1:  { bg:'#182a1e', fg:'#52a06a', bd:'#254030' },
    2:  { bg:'#1a2c1e', fg:'#5eaa72', bd:'#284233' },
    3:  { bg:'#1c2e1e', fg:'#6ab47a', bd:'#2a4433' },
    4:  { bg:'#2c280e', fg:'#c4a030', bd:'#443e18' },
    5:  { bg:'#2e280a', fg:'#ceaa28', bd:'#484018' },
    6:  { bg:'#322806', fg:'#d8b420', bd:'#4e4218' },
    7:  { bg:'#321c06', fg:'#e08830', bd:'#4e2c10' },
    8:  { bg:'#341206', fg:'#e07028', bd:'#501c10' },
    9:  { bg:'#360a06', fg:'#e05030', bd:'#521410' },
    10: { bg:'#380606', fg:'#f03030', bd:'#581010' },
  };

  function pStyle(p) {
    const c = PC[p];
    return `background:${c.bg};color:${c.fg};border-color:${c.bd};`;
  }

  // ── ADD-BAR STATE ─────────────────────────────────
  let addPriority = 5;

  function renderAddBar() {
    const row = document.getElementById('add-prow');
    row.innerHTML = '';
    for (let i = 1; i <= 10; i++) {
      const sq = document.createElement('div');
      sq.className = 'psq' + (i === addPriority ? ' sel' : '');
      sq.textContent = i;
      if (i === addPriority) sq.style.cssText = pStyle(i);
      const v = i;
      sq.onclick = () => { addPriority = v; renderAddBar(); };
      row.appendChild(sq);
    }
  }

  // ── DATA ──────────────────────────────────────────
  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
  function save(tasks) { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }

  // ── ACTIONS ───────────────────────────────────────
  function addTask() {
    const inp = document.getElementById('task-input');
    const text = inp.value.trim();
    if (!text) { inp.focus(); return; }
    const tasks = load();
    tasks.push({ id: Date.now(), text, status: 'todo', priority: addPriority });
    save(tasks);
    inp.value = '';
    inp.focus();
    render();
  }

  function moveTask(id, st) {
    save(load().map(t => t.id === id ? { ...t, status: st } : t));
    render();
  }

  function setP(id, p) {
    save(load().map(t => t.id === id ? { ...t, priority: p } : t));
    render();
  }

  function del(id) {
    if (!confirm('¿Eliminar esta tarea?')) return;
    save(load().filter(t => t.id !== id));
    render();
  }

  // ── RENDER ────────────────────────────────────────
  const COLS = ['todo','prog','done'];
  const MOVES = {
    todo: [{ st:'prog', lbl:'→ En Progreso', cls:'btn-prog' }, { st:'done', lbl:'→ Hecho', cls:'btn-done' }],
    prog: [{ st:'todo', lbl:'← Por Hacer',   cls:'btn-todo' }, { st:'done', lbl:'→ Hecho', cls:'btn-done' }],
    done: [{ st:'todo', lbl:'← Por Hacer',   cls:'btn-todo' }, { st:'prog', lbl:'← En Progreso', cls:'btn-prog' }],
  };
  const EMPTY = {
    todo: ['📋','Sin tareas pendientes'],
    prog: ['⚙️','Nada en progreso'],
    done: ['✅','Aún sin completar'],
  };

  function render() {
    const all = load();
    COLS.forEach(key => {
      let col = all.filter(t => t.status === key);
      // Sort by priority desc, except "done" (chronological order)
      if (key !== 'done') col = col.slice().sort((a,b) => (b.priority||5)-(a.priority||5));

      document.getElementById('badge-'+key).textContent = col.length;
      document.getElementById('cnt-'+key).textContent   = col.length;

      const body = document.getElementById('body-'+key);
      if (col.length === 0) {
        body.innerHTML = `<div class="empty"><span class="empty-icon">${EMPTY[key][0]}</span>${EMPTY[key][1]}</div>`;
        return;
      }
      body.innerHTML = '';

      col.forEach(task => {
        const p = task.priority || 5;
        const isDone = key === 'done';

        // Card
        const card = document.createElement('div');
        card.className = 'card';

        // Top row
        const top = document.createElement('div');
        top.className = 'card-top';

        const pb = document.createElement('div');
        pb.className = 'pbadge';
        pb.style.cssText = pStyle(p);
        pb.textContent = p;
        pb.title = `Prioridad ${p} de 10`;

        const txt = document.createElement('div');
        txt.className = 'card-text' + (isDone ? ' done-text' : '');
        txt.textContent = task.text;

        top.appendChild(pb);
        top.appendChild(txt);
        card.appendChild(top);

        // Priority editor (only for active tasks)
        if (!isDone) {
          const pedit = document.createElement('div');
          pedit.className = 'pedit-row';
          const lbl = document.createElement('span');
          lbl.textContent = 'prioridad:';
          pedit.appendChild(lbl);
          for (let i = 1; i <= 10; i++) {
            const sq = document.createElement('div');
            sq.className = 'msq' + (i === p ? ' sel' : '');
            sq.textContent = i;
            if (i === p) sq.style.cssText = pStyle(i);
            const v = i;
            sq.onclick = () => setP(task.id, v);
            pedit.appendChild(sq);
          }
          card.appendChild(pedit);
        }

        // Actions
        const actions = document.createElement('div');
        actions.className = 'card-actions';
        MOVES[key].forEach(({ st, lbl, cls }) => {
          const b = document.createElement('button');
          b.className = 'btn ' + cls;
          b.textContent = lbl;
          b.onclick = () => moveTask(task.id, st);
          actions.appendChild(b);
        });
        const db = document.createElement('button');
        db.className = 'btn btn-del';
        db.textContent = '✕ Eliminar';
        db.onclick = () => del(task.id);
        actions.appendChild(db);
        card.appendChild(actions);

        body.appendChild(card);
      });
    });
  }

  // ── INIT ──────────────────────────────────────────
  renderAddBar();
  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });
  render();
</script>
</body>
</html>
